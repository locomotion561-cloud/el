<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balon Patlatma Oyunu</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: black; }
        #video { display: none; } /* Kamera görüntüsünü gizliyoruz, sadece canvas'ı kullanacağız */
        #canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover;
            transform: scaleX(-1); /* Ayna modu */
        }
        #scoreBoard {
            position: absolute; top: 20px; left: 20px;
            color: white; font-family: Arial; font-size: 30px; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="scoreBoard">Skor: 0</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const scoreBoard = document.getElementById("scoreBoard");

        let handLandmarker;
        let balloons = [];
        let score = 0;

        // 1. Modeli yükle
        async function setup() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });
            startCamera();
        }

        // 2. Kamerayı başlat
        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.addEventListener("loadeddata", predict);
        }

        // 3. Tahmin döngüsü
        let lastTime = -1;
        function predict() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const now = performance.now();
            if (video.currentTime !== lastTime) {
                lastTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, now);
                
                let fx = -100, fy = -100;
                if (results.landmarks.length > 0) {
                    fx = (1 - results.landmarks[0][8].x) * canvas.width;
                    fy = results.landmarks[0][8].y * canvas.height;
                }
                updateGame(fx, fy);
            }
            requestAnimationFrame(predict);
        }

        // 4. Oyun mantığı
        function updateGame(fx, fy) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (Math.random() < 0.03) balloons.push({ x: Math.random() * canvas.width, y: canvas.height + 50, speed: 3 });

            balloons = balloons.filter(b => {
                b.y -= b.speed;
                const dist = Math.hypot(b.x - fx, b.y - fy);
                if (dist < 50) { score++; scoreBoard.innerText = `Skor: ${score}`; return false; }
                
                ctx.fillStyle = "red";
                ctx.beginPath();
                ctx.arc(b.x, b.y, 30, 0, Math.PI * 2);
                ctx.fill();
                return b.y > -50;
            });
        }

        setup();
    </script>
</body>
</html>
